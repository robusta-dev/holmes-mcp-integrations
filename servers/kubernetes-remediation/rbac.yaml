# ServiceAccount for the Kubernetes Remediation MCP Server
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-remediation-mcp-sa
  labels:
    app: kubernetes-remediation-mcp

---
# Scoped, least-privilege ClusterRole (NOT cluster-admin).
#
# Cluster-scoped because node operations (cordon/uncordon/drain/taint) require
# it. `secrets` is intentionally absent — defense in depth on top of the
# server's file-read denylist, so neither the API nor a file read can leak
# secret material. Override via your own ClusterRole/Role for stricter or
# namespaced setups.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-remediation-mcp-role
  labels:
    app: kubernetes-remediation-mcp
rules:
  # Workloads: scale / rollout restart|undo / edit / patch / delete
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "patch", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale", "replicasets/scale"]
    verbs: ["get", "update", "patch"]

  # Pods: restart(=delete), exec (read tools), run diagnostic images (create),
  # cleanup (delete), logs
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

  # Drain: evict pods
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]

  # Nodes: cordon / uncordon / drain / taint / label
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]

  # Batch remediation
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "create", "patch", "update", "delete"]

  # Read-only context (NO secrets)
  - apiGroups: [""]
    resources: ["events", "services", "configmaps", "namespaces", "replicationcontrollers"]
    verbs: ["get", "list"]

---
# ClusterRoleBinding - binds the scoped role above to the ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-remediation-mcp-binding
  labels:
    app: kubernetes-remediation-mcp
subjects:
  - kind: ServiceAccount
    name: kubernetes-remediation-mcp-sa
    namespace: default  # Change to your namespace
roleRef:
  kind: ClusterRole
  name: kubernetes-remediation-mcp-role
  apiGroup: rbac.authorization.k8s.io
